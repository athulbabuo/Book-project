<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<h1>create book</h1>

<form action="" method="post">

    {% csrf_token %}

    <label>Book Name:</label>
    <input type="text" name="title" placeholder="Enter The Book Name">

     <label>Book Price:</label>
    <input type="text" name="price" placeholder="Enter The Book Price">

    <input type="submit" value="submit">

</form>

<h1>List OF Books</h1>
<table class="table">
    <thead>
    <tr>
        <th scope="col">#</th>
        <th scope="col">Book Name</th>
        <th scope="col">Book Price</th>
        <th scope="col">Action</th>
    </tr>
    </thead>
    <tbody>
    {% for book in books %}
    <tr>
        <th scope="row">{{ forloop.counter }}</th>
        <td>{{ book.title}}</td>
        <td>{{book.price}}</td>
        <td><a href="{% url 'details' book.id %}" class="btn btn-primary">Details</a>
            <a href="{% url 'update' book.id %}" class="btn btn-success">Update</a>
            <a href="{% url 'delete' book.id %}" class="btn btn-danger">Delete</a>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>

</body>
</html>
